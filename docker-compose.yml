# QWERYS — Días 47-48. Secretos en .env (nunca en la imagen Docker).
# Uso: copiar .env.example → .env, rellenar JWT_SECRET y AI_API_KEY, luego:
#   docker compose up --build

services:

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-qwerys}
    # Host 3307 evita conflicto si ya tienes MySQL local en 3306
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  postgresql:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: qwerys_db
    ports:
      - "5433:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  mongodb:
    image: mongo:7.0
    ports:
      - "27018:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build: ./backend/qwerys-backend
    # Host 8081 si ya corres Spring Boot local en 8080
    ports:
      - "8081:8080"
    depends_on:
      mysql:
        condition: service_healthy
      postgresql:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_FALLBACK_API_KEY: ${AI_FALLBACK_API_KEY:-}
      APP_DATASOURCE_POSTGRESQL_PASSWORD: ${POSTGRES_PASSWORD}

  frontend:
    build: ./frontend/qwerys-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mysql_data:
  pg_data:
  mongo_data:
